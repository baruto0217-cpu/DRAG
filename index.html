<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>薬剤逆引き警戒アプリ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; background: #0a0d14; color: #e2e8f0; min-height: 100vh; }
    input, button { font-family: inherit; }
    input::placeholder { color: #4a5568; }
    mark { background: #f6e05e; color: #1a1a1a; border-radius: 2px; padding: 0 1px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0d14; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
    .card { border-radius: 10px; border: 1px solid #2d3748; overflow: hidden; background: #161b27; margin-bottom: 10px; transition: border-color 0.15s; }
    .card.open { border-color: var(--card-color); }
    .card-header { padding: 12px 14px; cursor: pointer; display: flex; gap: 10px; align-items: flex-start; }
    .card-detail { background: #0f1420; }
    .badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 8px; display: inline-block; }
    .tag-sm { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: #0d1f35; color: #4a90d9; }
    .tag-disease { font-size: 9px; padding: 1px 5px; border-radius: 4px; background: #0a1f14; border: 1px solid #1a4a2a; color: #4a9568; }
    .tag-disease-lg { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: #0d2a1a; border: 1px solid #276749; color: #68d391; }
    .btn-filter { padding: 5px 11px; border-radius: 14px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #161b27; color: #718096; transition: all 0.15s; }
    .btn-filter.active { color: #fff; }
    .btn-hint { padding: 3px 10px; border-radius: 12px; border: 1px solid #2d3748; background: none; color: #718096; font-size: 11px; cursor: pointer; }
    .btn-tab { padding: 8px 16px; border-radius: 8px 8px 0 0; border: none; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: #718096; border-bottom: 2px solid transparent; }
    .btn-tab.active { background: #0a0d14; color: #fff; border-bottom: 2px solid #e53e3e; }
    .condition-box { background: #161b27; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
    .action-box { font-size: 12px; color: #f6ad55; background: #1a1400; border-left: 3px solid #d97706; border-radius: 0 4px 4px 0; padding: 5px 10px; line-height: 1.6; }
    .point-item { display: flex; gap: 8px; align-items: flex-start; font-size: 12px; color: #e2e8f0; line-height: 1.7; margin-bottom: 2px; }
    .chevron { color: #4a5568; font-size: 13px; flex-shrink: 0; transition: transform 0.2s; margin-top: 4px; }
    .chevron.open { transform: rotate(180deg); }
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap input { width: 100%; padding: 12px 36px 12px 38px; background: #161b27; border: 1px solid #2d3748; border-radius: 8px; color: #e2e8f0; font-size: 15px; outline: none; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
    .clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #718096; cursor: pointer; font-size: 18px; }
    #app { max-width: 760px; margin: 0 auto; padding: 14px; }
    .header { background: linear-gradient(135deg, #1a0a0a 0%, #0a0d14 60%); border-bottom: 2px solid #e53e3e; padding: 18px 20px 0; }
    .header-inner { max-width: 760px; margin: 0 auto; }
    .info-banner { background: #1a1a0a; border: 1px solid #d97706; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #d97706; line-height: 1.7; margin-bottom: 12px; }
    .disclaimer { margin-top: 16px; padding: 10px; background: #1a0f0f; border-radius: 8px; border: 1px solid #4a1818; font-size: 11px; color: #4a5568; line-height: 1.7; }
    .empty { text-align: center; padding: 48px 0; color: #4a5568; }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .legend { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .legend-badge { border-radius: 6px; padding: 2px 8px; font-weight: 700; font-size: 11px; }
    .flex-wrap { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .flex-col { display: flex; flex-direction: column; gap: 10px; }
    .count-text { font-size: 11px; color: #4a5568; margin-bottom: 10px; }
    .section-label { font-size: 11px; font-weight: 800; margin-bottom: 6px; letter-spacing: 0.08em; }
    .mic-btn {
      position: absolute; right: 38px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 18px;
      padding: 4px; border-radius: 50%; transition: background 0.15s; line-height: 1;
    }
    .mic-btn:hover { background: #2d3748; }
    .mic-btn.listening {
      animation: pulse 0.8s ease-in-out infinite alternate;
      background: #2d0a0a;
    }
    @keyframes pulse {
      from { box-shadow: 0 0 0 0 rgba(229,62,62,0.6); }
      to   { box-shadow: 0 0 0 8px rgba(229,62,62,0); }
    }
    .mic-unsupported { display: none; }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
      <span style="font-size:28px;">⚠️</span>
      <div>
        <h1 style="font-size:20px;font-weight:900;color:#fff;letter-spacing:0.04em;">薬剤逆引き警戒アプリ</h1>
        <p style="font-size:11px;color:#718096;" id="subtitle">DRUG ALERT REVERSE LOOKUP — お薬手帳を見たら→この病態を疑え</p>
      </div>
    </div>
    <div class="info-banner">
      💡 <strong>使い方：</strong>お薬手帳で薬名を見つけたら「薬名から検索」、傷病者の既往歴から調べたい場合は「疾患名から検索」
    </div>
    <div style="display:flex;gap:4px;">
      <button class="btn-tab active" id="tab-drug" onclick="switchMode('drug')">💊 薬名から検索</button>
      <button class="btn-tab" id="tab-disease" onclick="switchMode('disease')">🏥 疾患名から検索</button>
    </div>
  </div>
</div>

<!-- コンテンツ -->
<div id="app">
  <!-- 薬名検索パネル -->
  <div id="panel-drug">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="drug-search" placeholder="薬名・商品名・病態名で検索（例：ワーファリン、ジゴキシン、低血糖…）" oninput="renderDrugList()" />
      <button class="mic-btn" id="mic-drug" onclick="startVoice('drug')" title="音声検索">🎤</button>
      <button class="clear-btn" onclick="document.getElementById('drug-search').value='';renderDrugList();" style="display:none;" id="drug-clear">✕</button>
    </div>
    <div class="flex-wrap" id="drug-hints"></div>
    <div class="flex-wrap" id="drug-cats"></div>
    <p class="count-text" id="drug-count"></p>
    <div id="drug-list" class="flex-col"></div>
    <div class="legend" id="drug-legend"></div>
  </div>

  <!-- 疾患検索パネル -->
  <div id="panel-disease" style="display:none;">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="disease-search" placeholder="疾患名で検索（例：心房細動、糖尿病、てんかん…）" oninput="renderDiseaseList()" />
      <button class="mic-btn" id="mic-disease" onclick="startVoice('disease')" title="音声検索">🎤</button>
      <button class="clear-btn" onclick="document.getElementById('disease-search').value='';renderDiseaseList();" style="display:none;" id="dis-clear">✕</button>
    </div>
    <div class="flex-wrap" id="dis-hints"></div>
    <div class="flex-wrap" id="dis-cats"></div>
    <p class="count-text" id="dis-count"></p>
    <div id="dis-list" class="flex-col"></div>
  </div>

  <div class="disclaimer">⚠️ 本アプリは学習・参照用です。実際の判断は各施設のプロトコルと医師の指示に従ってください。</div>
</div>

<script>
// =====================================================
// データ定義
// =====================================================

// =====================================================
// ユーティリティ
// =====================================================
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function hlHtml(text, q){
  if(!q) return esc(text);
  const e = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(text).replace(new RegExp(e.replace(/[a-z]/gi,c=>`[${c}${c.toUpperCase()}]`),'gi'), m=>`<mark>${m}</mark>`);
}

function matchAlert(a, q, cat){
  if(cat !== "すべて" && a.category !== cat) return false;
  if(!q) return true;
  const ql = q.toLowerCase();
  return a.drugs.some(d=>d.toLowerCase().includes(ql))
      || a.stemHint.toLowerCase().includes(ql)
      || a.title.includes(q)
      || a.conditions.some(c=>c.name.includes(q)||c.desc.includes(q))
      || a.points.some(p=>p.includes(q));
}

function matchDisease(d, q, cat){
  if(cat !== "すべて" && d.cat !== cat) return false;
  if(!q) return true;
  const ql = q.toLowerCase();
  return d.name.toLowerCase().includes(ql)
      || d.drugs.some(dr=>dr.name.toLowerCase().includes(ql)||dr.alerts.includes(q)||dr.reason.includes(q));
}

function switchMode(mode){
  state.mode = mode;
  document.getElementById('panel-drug').style.display     = mode==='drug'    ? '' : 'none';
  document.getElementById('panel-disease').style.display  = mode==='disease' ? '' : 'none';
  document.getElementById('tab-drug').className    = 'btn-tab' + (mode==='drug'    ? ' active' : '');
  document.getElementById('tab-disease').className = 'btn-tab' + (mode==='disease' ? ' active' : '');
}

function renderDrugList(){
  const q   = document.getElementById('drug-search').value;
  const clear = document.getElementById('drug-clear');
  clear.style.display = q ? '' : 'none';
  state.drugQ = q;

  const hints = document.getElementById('drug-hints');
  hints.style.display = q ? 'none' : '';

  const filtered = ALERTS.filter(a=>matchAlert(a, q, state.drugCat));
  document.getElementById('drug-count').textContent = `${filtered.length} / ${ALERTS.length} 件表示`;

  const el = document.getElementById('drug-list');
  if(filtered.length===0){

    return;
  }
  el.innerHTML = filtered.map(a=>renderAlertCard(a, q)).join('');
}

}

function renderAlertCard(a, q){
  const lm  = LEVEL_META[a.level];
  const cc  = CAT_COLORS[a.category]||'#4a5568';
  const isOpen = state.openAlert === a.id;

  const drugTags = a.drugs.slice(0,6).map(d=>`<span class="tag-sm">${hlHtml(d,q)}</span>`).join('');
  const moreDrugs = a.drugs.length>6 ? `<span style="font-size:10px;color:#4a5568;">+${a.drugs.length-6}件</span>` : '';
  const disTags = (a.diseases||[]).slice(0,3).map(d=>`<span class="tag-disease">${esc(d)}</span>`).join('');
  const moreDis = (a.diseases||[]).length>3 ? `<span style="font-size:9px;color:#4a5568;">+${(a.diseases||[]).length-3}件</span>` : '';

  let detail = '';
  if(isOpen){
    const disAllTags = (a.diseases||[]).map(d=>`<span class="tag-disease-lg">${esc(d)}</span>`).join('');
    const conditions = a.conditions.map(c=>`
      <div class="condition-box" style="border:1px solid ${cc}44;">
        <div style="background:${cc}22;padding:6px 12px;font-weight:700;font-size:13px;color:${cc};">${hlHtml(c.name,q)}</div>
        <div style="padding:8px 12px;">
          <div style="font-size:12px;color:#a0aec0;line-height:1.7;margin-bottom:6px;white-space:pre-line;">${hlHtml(c.desc,q)}</div>
          <div class="action-box">▶ ${hlHtml(c.action,q)}</div>
        </div>
      </div>`).join('');
    const points = a.points.map(p=>`<div class="point-item"><span style="color:#63b3ed;flex-shrink:0;">•</span><span>${hlHtml(p,q)}</span></div>`).join('');
    detail = `
      <div class="card-detail" style="border-top:1px solid ${cc}44;">
        <div style="padding:12px 14px;">
          ${a.diseases&&a.diseases.length?`<div style="margin-bottom:12px;"><div class="section-label" style="color:#68d391;">🏥 この薬を飲んでいる人が患っている疾患</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${disAllTags}</div></div>`:''}
          <div class="section-label" style="color:#e53e3e;">🚨 疑うべき病態とアクション</div>
          <div style="margin-bottom:10px;">${conditions}</div>
          <div class="section-label" style="color:#63b3ed;">📌 覚えておくべきポイント</div>
          ${points}
        </div>
      </div>`;
  }

  return `
    <div class="card${isOpen?' open':''}" style="--card-color:${cc};">
      <div class="card-header" onclick="toggleAlert(${a.id})">
        <span style="font-size:24px;flex-shrink:0;">${a.icon}</span>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;align-items:center;">
            <span class="badge" style="background:${lm.bg};color:${lm.color};border:1px solid ${lm.color};">🚨 ${lm.label}</span>
            <span class="badge" style="background:${cc}22;color:${cc};border:1px solid ${cc}55;">${esc(a.category)}</span>
          </div>
          <div style="font-weight:800;font-size:14px;color:#f7fafc;margin-bottom:4px;line-height:1.4;">${hlHtml(a.title,q)}</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px;">${drugTags}${moreDrugs}</div>
          <div style="font-size:10px;color:#4a5568;margin-top:3px;">${esc(a.stemHint)}</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;">${disTags}${moreDis}</div>
        </div>
        <span class="chevron${isOpen?' open':''}">▼</span>
      </div>
      ${detail}
    </div>`;
}

function renderDiseaseCard(d){
  const cc = DIS_COLORS[d.cat]||'#4a5568';
  const isOpen = state.openDis === d.id;
  const drugNames = d.drugs.map(dr=>dr.name.split('（')[0]).join(' / ');

  let detail = '';
  if(isOpen){
    const drugItems = d.drugs.map(dr=>`
      <div style="background:#161b27;border-radius:8px;border:1px solid #2d3748;overflow:hidden;margin-bottom:8px;">
        <div style="background:${cc}18;padding:6px 12px;font-size:12px;font-weight:700;color:${cc};">${esc(dr.name)}</div>
        <div style="padding:8px 12px;">
          <div style="font-size:11px;color:#718096;margin-bottom:5px;">処方目的：<span style="color:#a0aec0;">${esc(dr.reason)}</span></div>
          <div style="font-size:12px;color:#f6ad55;background:#1a1400;border-left:3px solid #e53e3e;border-radius:0 4px 4px 0;padding:6px 10px;line-height:1.7;">⚠ ${esc(dr.alerts)}</div>
        </div>
      </div>`).join('');
    detail = `
      <div style="border-top:1px solid ${cc}44;background:#0f1420;padding:12px 14px;">
        <div class="section-label" style="color:#63b3ed;margin-bottom:8px;">💊 服用中の可能性がある薬と注意事項</div>
        ${drugItems}
      </div>`;
  }

  return `
    <div class="card${isOpen?' open':''}" style="--card-color:${cc};">
      <div class="card-header" onclick="toggleDisease('${d.id}')">
        <span style="font-size:22px;flex-shrink:0;">${d.icon}</span>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
            <span style="font-weight:800;font-size:15px;color:#f7fafc;">${esc(d.name)}</span>
            <span class="badge" style="background:${cc}22;color:${cc};border:1px solid ${cc}55;">${esc(d.cat)}</span>
          </div>
          <div style="font-size:11px;color:#4a5568;">服用中の可能性がある薬：${esc(drugNames)}</div>
        </div>
        <span class="chevron${isOpen?' open':''}">▼</span>
      </div>
      ${detail}
    </div>`;
}

// =====================================================
// イベントハンドラ
// =====================================================
function toggleAlert(id){
  state.openAlert = state.openAlert===id ? null : id;
  renderDrugList();
}
function toggleDisease(id){
  state.openDis = state.openDis===id ? null : id;
  renderDiseaseList();
}
function setDrugQ(q){
  document.getElementById('drug-search').value = q;
  renderDrugList();
}
function setDisQ(q){
  document.getElementById('disease-search').value = q;
  renderDiseaseList();
}
function setDrugCat(c){
  state.drugCat = c;
  state.openAlert = null;
  renderDrugCats();
  renderDrugList();
}
function setDisCat(c){
  state.disCat = c;
  state.openDis = null;
  renderDisCats();
  renderDiseaseList();
}

// =====================================================
// 音声検索（Web Speech API）
// =====================================================
(function(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  // 非対応ブラウザではマイクボタンを非表示
  if (!SpeechRecognition) {
    document.querySelectorAll('.mic-btn').forEach(el => el.style.display = 'none');
    return;
  }

  let recognition = null;
  let activeMode  = null; // 'drug' | 'disease'

  function createRecognition() {
    const r = new SpeechRecognition();
    r.lang = 'ja-JP';
    r.interimResults = true;   // 途中結果もリアルタイムに反映
    r.continuous = false;
    r.maxAlternatives = 1;

    r.onstart = function() {
      // onfocus/onstart は環境依存のため startVoice 側で UI を更新済み
    };

    r.onresult = function(e) {
      const transcript = Array.from(e.results)
        .map(r => r[0].transcript).join('');
      const inputId = activeMode === 'drug' ? 'drug-search' : 'disease-search';
      document.getElementById(inputId).value = transcript;
      if (activeMode === 'drug')    { state.drugQ = transcript; renderDrugList(); }
      if (activeMode === 'disease') { state.disQ  = transcript; renderDiseaseList(); }
    };

    // onend は startVoice 側で上書きして使う
    r.onend = null;

    r.onerror = function(e) {
      if (!recognition) return;
      const msg = e.error === 'not-allowed'
        ? 'マイクの使用が許可されていません。\nブラウザの設定からマイクを許可してください。'
        : e.error === 'no-speech'
        ? '音声が検出されませんでした。もう一度お試しください。'
        : '音声認識エラー: ' + e.error;
      if (e.error !== 'no-speech') alert(msg);
      stopVoice();
    };

    return r;
  }

  function stopVoice() {
    // recognition を先に null にしてから stop() → onend の再発火を防ぐ
    const r = recognition;
    recognition = null;
    activeMode  = null;
    document.querySelectorAll('.mic-btn').forEach(btn => {
      btn.classList.remove('listening');
      btn.textContent = '🎤';
    });
    if (r) { try { r.stop(); } catch(_) {} }
  }

  window.startVoice = function(mode) {
    // すでに認識中なら停止
    if (recognition) { stopVoice(); return; }

    activeMode  = mode;

    // ボタンをタップした瞬間に色を変える（onstart 待ちにしない）
    const btn = document.getElementById('mic-' + mode);
    if (btn) { btn.classList.add('listening'); btn.textContent = '🔴'; }

    // 入力欄のプレースホルダーを変更
    const inputId = mode === 'drug' ? 'drug-search' : 'disease-search';
    const input = document.getElementById(inputId);
    const origPlaceholder = input.placeholder;
    input.placeholder = '🎤 話してください…';

    recognition = createRecognition();

    // onend 時にプレースホルダーを戻す
    let ended = false;
    recognition.onend = function() {
      if (ended) return; // 二重発火防止
      ended = true;
      input.placeholder = origPlaceholder;
      stopVoice();
    };

    try {
      recognition.start();
    } catch(e) {
      input.placeholder = origPlaceholder;
      alert('音声認識を開始できませんでした: ' + e.message);
      stopVoice();
    }
  };
})();
</script>
